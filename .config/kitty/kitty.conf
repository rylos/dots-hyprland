# Font
font_family      JetBrains Mono Nerd Font
font_size 11.0
text_composition_strategy legacy
font_features none
disable_ligatures never

# Anti-aliasing e rendering
macos_thicken_font 0
macos_traditional_fullscreen no

# Terminal type (compatibilità sistemi remoti)
term xterm-256color

# Shell
shell /usr/bin/zsh

# Cursor
cursor_shape beam
cursor_trail 1
cursor_blink_interval 0
cursor_stop_blinking_after 15.0
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0

# Padding (why weird value? consistency with foot)
window_margin_width 21.75

# No stupid close confirmation
confirm_os_window_close 0

# Tab bar (Modern style)
tab_bar_edge bottom
tab_bar_margin_width 4
tab_bar_margin_height 2.0 2.0
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1

# Tab title format
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{title}"
tab_separator " ┇ "

# Rendering più soft
modify_font cell_width 100%
modify_font cell_height 100%

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# URL handling
url_style curly

# Mouse
mouse_hide_wait 3.0
copy_on_select no

# Terminal features
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# KeyBindings
map ctrl+shift+n send_text all ssh -p 2222 marco@home.ziliani.net

